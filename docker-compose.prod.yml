# Production stack: Postgres (no public port) + Next.js app on localhost:3000 only.
# Use Caddy/nginx on the host for HTTPS → reverse_proxy 127.0.0.1:3000
#
# 1. Copy .env.example ideas into .env on the server (never commit .env).
# 2. Set POSTGRES_PASSWORD below OR use docker compose --env-file with matching DATABASE_URL.
#
# Build (embeds NEXT_PUBLIC_APP_URL into the client bundle):
#   export NEXT_PUBLIC_APP_URL=https://portal.333mtrsprts.com
#   docker compose -f docker-compose.prod.yml build --build-arg NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL
#   docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or shell}
      POSTGRES_DB: portal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d portal"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Intentionally no ports: — DB only reachable inside the Docker network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        DATABASE_URL: postgresql://portal:${POSTGRES_PASSWORD}@db:5432/portal?schema=public
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://portal:${POSTGRES_PASSWORD}@db:5432/portal?schema=public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-0}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-333 Motorsports <noreply@333mtrsprts.com>}
      MAIL_REPLY_TO_SENDER: ${MAIL_REPLY_TO_SENDER:-}
      MAIL_DELIVERY_TARGET: ${MAIL_DELIVERY_TARGET:-external}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET:-}
      NEXT_PUBLIC_GIPHY_API_KEY: ${NEXT_PUBLIC_GIPHY_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - portal_uploads:/app/public/uploads

  # One-off: creates admin@333mtrsprts.com + sample data (see prisma/seed.ts). Not started by `up`.
  # Run: docker compose -f docker-compose.prod.yml --profile seed run --rm seed
  seed:
    profiles: ["seed"]
    # bookworm-slim can trigger Prisma OpenSSL detection issues; full image is fine for a rare one-off seed.
    image: node:22-bookworm
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://portal:${POSTGRES_PASSWORD}@db:5432/portal?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: bash -c "npm ci && npx prisma db seed"

volumes:
  pgdata:
  portal_uploads:
